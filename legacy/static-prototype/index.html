<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>AsNeeded — Operational control for healthcare staffing</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Geist', 'ui-sans-serif', 'system-ui'],
          mono: ['"Geist Mono"', 'ui-monospace', 'Menlo'],
          serif: ['"Instrument Serif"', 'ui-serif', 'Georgia'],
        },
        colors: {
          ink: {
            50:  '#f7f8f8',
            100: '#eceef0',
            200: '#dadde1',
            300: '#b9bec4',
            400: '#8a929b',
            500: '#5e6873',
            600: '#434c56',
            700: '#2f3740',
            800: '#1d242c',
            900: '#0e1318',
            950: '#070a0d',
          },
          teal: {
            50:  '#eef9f8',
            100: '#d6f1ef',
            200: '#aee2de',
            300: '#7ccdc7',
            400: '#46b1aa',
            500: '#1d9590',
            600: '#0f7975',
            700: '#0c615e',
            800: '#0a4d4b',
            900: '#093d3c',
          },
          paper: '#fafaf7',
        },
        boxShadow: {
          'card': '0 1px 0 0 rgb(0 0 0 / 0.04), 0 0 0 1px rgb(15 121 117 / 0.04)',
          'lifted': '0 1px 2px rgb(0 0 0 / 0.04), 0 8px 24px -8px rgb(15 121 117 / 0.10), 0 0 0 1px rgb(0 0 0 / 0.04)',
          'deep': '0 30px 60px -20px rgb(10 77 75 / 0.18), 0 18px 36px -18px rgb(10 77 75 / 0.10), 0 0 0 1px rgb(10 77 75 / 0.06)',
        }
      }
    }
  }
</script>

<style>
  html, body { background: #fafaf7; color: #0e1318; }
  body { font-family: 'Geist', ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-mono { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; }

  /* Subtle dotted backdrop, a la dashboard surfaces */
  .bg-grid {
    background-image:
      linear-gradient(to right, rgba(15,121,117,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(15,121,117,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .bg-dots {
    background-image: radial-gradient(rgba(15,121,117,0.18) 1px, transparent 1px);
    background-size: 18px 18px;
  }

  /* Hairline divider */
  .hr-thin { border-top: 1px solid rgba(14,19,24,0.08); }

  /* Stripe placeholder for imagery */
  .stripe-ph {
    background-image: repeating-linear-gradient(135deg,
      rgba(15,121,117,0.08) 0 8px, transparent 8px 16px);
  }

  /* Marquee */
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee-track { animation: marquee 38s linear infinite; }

  /* Pulse dot */
  @keyframes ping-slow {
    0% { transform: scale(1); opacity: 0.8; }
    80%, 100% { transform: scale(2.6); opacity: 0; }
  }
  .ping-slow { animation: ping-slow 1.8s cubic-bezier(0,0,0.2,1) infinite; }

  /* Workflow line draw */
  @keyframes dash {
    to { stroke-dashoffset: -24; }
  }
  .dash-flow { stroke-dasharray: 6 6; animation: dash 1.2s linear infinite; }

  /* Gentle rise-in on enter */
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .rise-in { animation: rise 0.6s ease-out both; }

  /* Selection */
  ::selection { background: #0c615e; color: #fafaf7; }

  /* Scrollbar inside dashboard panes */
  .nice-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .nice-scroll::-webkit-scrollbar-thumb { background: rgba(14,19,24,0.18); border-radius: 999px; }

  /* Tab focus */
  button:focus-visible, a:focus-visible { outline: 2px solid #0f7975; outline-offset: 2px; border-radius: 4px; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="typescript,react" src="primitives.tsx"></script>
<script type="text/babel" data-presets="typescript,react" src="dashboard.tsx"></script>
<script type="text/babel" data-presets="typescript,react" src="sections.tsx"></script>
<script type="text/babel" data-presets="typescript,react" src="app.tsx"></script>

</body>
</html>
