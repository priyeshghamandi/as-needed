<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans:['Geist','ui-sans-serif','system-ui'], mono:['"Geist Mono"','ui-monospace','Menlo'], serif:['"Instrument Serif"','ui-serif','Georgia'] },
    colors: {
      ink: { 50:'#f7f8f8',100:'#eceef0',200:'#dadde1',300:'#b9bec4',400:'#8a929b',500:'#5e6873',600:'#434c56',700:'#2f3740',800:'#1d242c',900:'#0e1318',950:'#070a0d' },
      teal: { 50:'#eef9f8',100:'#d6f1ef',200:'#aee2de',300:'#7ccdc7',400:'#46b1aa',500:'#1d9590',600:'#0f7975',700:'#0c615e',800:'#0a4d4b',900:'#093d3c' },
      paper: '#fafaf7',
    },
    boxShadow: {
      'card': '0 1px 0 0 rgb(0 0 0 / 0.04), 0 0 0 1px rgb(15 121 117 / 0.04)',
      'lifted': '0 1px 2px rgb(0 0 0 / 0.04), 0 8px 24px -8px rgb(15 121 117 / 0.10), 0 0 0 1px rgb(0 0 0 / 0.04)',
    }
  }}}
</script>
<style>
  html,body{background:#fafaf7;color:#0e1318;}
  body{font-family:'Geist',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .font-mono{font-family:'Geist Mono',ui-monospace,Menlo,monospace;}
  ::selection{background:#0c615e;color:#fafaf7;}
  @keyframes ping-slow{0%{transform:scale(1);opacity:.8;}80%,100%{transform:scale(2.6);opacity:0;}}
  .ping-slow{animation:ping-slow 1.8s cubic-bezier(0,0,0.2,1) infinite;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .rise-in{animation:rise .35s ease-out both;}
  .scrollarea::-webkit-scrollbar{width:8px;height:8px;}
  .scrollarea::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:4px;}
  button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid #0f7975;outline-offset:2px;border-radius:4px;}
</style>
