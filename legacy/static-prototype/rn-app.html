<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>RN App · AsNeeded</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans:['Geist','ui-sans-serif','system-ui'], mono:['"Geist Mono"','ui-monospace','Menlo'], serif:['"Instrument Serif"','ui-serif','Georgia'] },
    colors: {
      ink: { 50:'#f7f8f8',100:'#eceef0',200:'#dadde1',300:'#b9bec4',400:'#8a929b',500:'#5e6873',600:'#434c56',700:'#2f3740',800:'#1d242c',900:'#0e1318',950:'#070a0d' },
      teal: { 50:'#eef9f8',100:'#d6f1ef',200:'#aee2de',300:'#7ccdc7',400:'#46b1aa',500:'#1d9590',600:'#0f7975',700:'#0c615e',800:'#0a4d4b',900:'#093d3c' },
      paper: '#fafaf7',
    },
    boxShadow: {
      'card': '0 1px 0 0 rgb(0 0 0 / 0.04), 0 0 0 1px rgb(15 121 117 / 0.04)',
      'lifted': '0 1px 2px rgb(0 0 0 / 0.04), 0 8px 24px -8px rgb(15 121 117 / 0.10), 0 0 0 1px rgb(0 0 0 / 0.04)',
    }
  }}}
</script>
<style>
  html,body{background:#f0eee9;color:#0e1318;}
  body{font-family:'Geist',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .font-mono{font-family:'Geist Mono',ui-monospace,Menlo,monospace;}
  ::selection{background:#0c615e;color:#fafaf7;}
  @keyframes ping-slow{0%{transform:scale(1);opacity:.8;}80%,100%{transform:scale(2.6);opacity:0;}}
  .ping-slow{animation:ping-slow 1.8s cubic-bezier(0,0,0.2,1) infinite;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .rise-in{animation:rise .35s ease-out both;}
  .scrollarea::-webkit-scrollbar{width:6px;height:6px;}
  .scrollarea::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.18);border-radius:3px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="typescript,react" src="primitives.tsx"></script>
<script type="text/babel" data-presets="typescript,react" src="rn-screens.tsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" data-presets="typescript,react">
const { S1_Notifications, S2_Details, S3_AcceptDecline, S4_MyShifts, S5_Availability, S6_Cancellation, IOSDevice } = window;

function Frame({ children }) {
  return (
    <div style={{ background:'#000', borderRadius:48, padding:0, transformOrigin:'top left' }}>
      <IOSDevice width={402} height={874} dark={false}>
        {children}
      </IOSDevice>
    </div>
  );
}

function App() {
  const screens = [
    { id:"notifs",    label:"01 · Notifications",       Cmp: S1_Notifications,  note:"Push, in-app, and SMS unified · operational urgency at the top." },
    { id:"details",   label:"02 · Shift details",        Cmp: S2_Details,        note:"All facts the RN needs in one scroll · compliance + map + coordinator." },
    { id:"accept",    label:"03 · Accept / decline",     Cmp: S3_AcceptDecline,  note:"Three-state flow: confirm acknowledgements, success cascade, decline reasons." },
    { id:"shifts",    label:"04 · My shifts",            Cmp: S4_MyShifts,       note:"Hours strip + tabs + list/cal toggle · check-in lives on the active card." },
    { id:"avail",     label:"05 · Availability",         Cmp: S5_Availability,   note:"Quick-set, weekly grid, prefs, facility favorites, travel radius." },
    { id:"cancel",    label:"06 · Cancellation",         Cmp: S6_Cancellation,   note:"Time-pressure framing · reason picker · auto-replacement broadcast." },
  ];

  return (
    <window.DesignCanvas title="AsNeeded · RN companion app" subtitle="6 mobile screens · iOS · operational shift management">
      <window.DCSection id="rn-flow" title="RN Interaction Flow" subtitle="Notifications → Details → Accept → My Shifts → Availability → Cancellation">
        {screens.map(s => (
          <window.DCArtboard key={s.id} id={s.id} label={s.label} width={402} height={874} note={s.note}>
            <IOSDevice width={402} height={874} dark={false}>
              <s.Cmp />
            </IOSDevice>
          </window.DCArtboard>
        ))}
      </window.DCSection>
    </window.DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
